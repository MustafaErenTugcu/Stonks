<div class="p-4 max-w-md mx-auto mt-10 bg-white rounded-lg shadow-md">
    <h2 class="text-2xl font-bold mb-4 text-center">Giriş Yap</h2>
  
    <form (ngSubmit)="login()">
      <div class="mb-4">
        <label class="block font-medium mb-1">Kullanıcı Adı</label>
        <input type="text" [(ngModel)]="username" name="username" class="p-inputtext p-component w-full" required />
      </div>
      <div class="mb-4">
        <label class="block font-medium mb-1">Şifre</label>
        <input type="password" [(ngModel)]="password" name="password" class="p-inputtext p-component w-full" required />
      </div>
  
      <div class="flex justify-between">
        <button type="submit" pButton label="Giriş Yap" class="p-button-success"></button>
        <button type="button" pButton label="Kapat" class="p-button-secondary" (click)="closeDialog()"></button>
      </div>
    </form>
  </div>
